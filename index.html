<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8">
    <title>Delayota</title>
    <style>
      body {
          font-family: Arial, sans-serif;
          margin: 0;
          padding: 0;
          line-height: 1.6;
      }

      .jarak {
          padding: 0 2pc;
      }

      .header {
          background-color: #333;
          color: #fff;
          padding: 20px 0;
          text-align: center;
      }

      .menu {
          background-color: #417aa8;
          height: 50px;
          line-height: 50px;
          position: relative;
          width: 90%;
          margin: 0 auto;
          padding: 0 auto;
          overflow: hidden;
      }

      .menu ul {
          list-style: none;
          margin: 0;
          padding: 0;
      }

      .menu ul li a {
          float: left;
          width: 70px;
          display: block;
          text-align: center;
          color: #FFF;
          text-decoration: none;
      }

      .menu ul li a:hover {
          background-color: #4b88bb;
          display: block;
      }

      .content, .sidebar, .footer {
          padding: 20px;
      }

      .sidebar ul {
          list-style: none;
          padding: 0;
      }

      .sidebar ul li a {
          text-decoration: none;
          color: #333;
      }

      .sidebar ul li a:hover {
          color: #007bff;
      }

      .footer {
          background-color: #f4f4f4;
          text-align: center;
          font-size: 0.9em;
          border-top: 1px solid #ddd;
      }
    </style>
 </head>

      </div>
